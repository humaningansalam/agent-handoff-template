name: Release repoctl control plane

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Extract release version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('repoctl-upgrade-manifest.json'))['version'])")
          test "$VERSION" = "$MANIFEST_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release tag
        id: existing
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify existing tag points at this commit
        if: steps.existing.outputs.tag_exists == 'true' && steps.existing.outputs.release_exists == 'false'
        run: |
          TAG_SHA=$(git rev-list -n 1 "${{ steps.version.outputs.tag }}")
          test "$TAG_SHA" = "$GITHUB_SHA"

      - name: Verify tests
        if: steps.existing.outputs.release_exists == 'false'
        run: uv run pytest -q

      - name: Verify workspace contracts
        if: steps.existing.outputs.release_exists == 'false'
        run: |
          ./scripts/repoctl check --json
          ./scripts/repoctl meta check --json

      - name: Build release artifact
        if: steps.existing.outputs.release_exists == 'false'
        run: uv run python -m tools.repoctl.release dist

      - name: Create release tag
        if: steps.existing.outputs.tag_exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.existing.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/*.tar.gz
          generate_release_notes: true
